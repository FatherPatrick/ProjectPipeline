version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: personal_data_dashboard_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: personal_data_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: personal_data_dashboard_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - dashboard_network

volumes:
  postgres_data:

networks:
  dashboard_network:
    driver: bridge

  # ── Application services ───────────────────────────────────────────────────

  api:
    build: .
    container_name: personal_data_dashboard_api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/personal_data_dashboard
      ENVIRONMENT: production
      DEBUG: "false"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dashboard_network
    volumes:
      - ./logs:/app/logs

  dashboard:
    build: .
    container_name: personal_data_dashboard_ui
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/personal_data_dashboard
      ENVIRONMENT: production
      DEBUG: "false"
      PORT: "8050"
      # Point dashboard at the API container
      API_URL: http://api:8000
    ports:
      - "8050:8050"
    command: >
      sh -c "gunicorn dashboard.app:server
        --bind 0.0.0.0:${PORT:-8050}
        --workers 2
        --timeout 120
        --log-level info"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - dashboard_network
